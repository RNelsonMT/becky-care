<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Seed Presets</title>
<style>
  body { font-family: system-ui, sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; background: #f0f4f4; color: #1a2e3b; }
  h1 { font-size: 22px; margin-bottom: 8px; }
  .status { background: #fff; border-radius: 12px; padding: 20px; margin-top: 20px; box-shadow: 0 2px 8px rgba(0,0,0,.1); }
  .item { font-size: 13px; padding: 3px 0; border-bottom: 1px solid #f0f4f4; }
  .item.ok { color: #1e7e4c; }
  .item.err { color: #c0392b; }
  #summary { font-size: 16px; font-weight: 700; margin-top: 16px; }
  button { background: #2a7f7f; color: #fff; border: none; border-radius: 8px; padding: 14px 28px; font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 16px; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
</style>
</head>
<body>
<h1>🌱 Becky's Care — Preset Seeder</h1>
<p>Click the button below to load all presets into Firestore. <b>Only run this once after clearing the presets collection.</b></p>
<button id="seedBtn" onclick="runSeed()">Seed All Presets Now</button>
<div class="status" id="status" style="display:none">
  <div id="log"></div>
  <div id="summary"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCxPjDCBYFLc2XDqXvHcbGuqMV7265w3HE",
  authDomain: "care-tracker-383e0.firebaseapp.com",
  projectId: "care-tracker-383e0",
  storageBucket: "care-tracker-383e0.firebasestorage.app",
  messagingSenderId: "696799569086",
  appId: "1:696799569086:web:08b7e6356a018338a3aaef"
};

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);
const presetsCol = collection(db, 'presets');

const PRESETS = [
  // MEDICATIONS — Scheduled
  { cat:'med', name:'Baclofen 10mg — G tube, bedtime' },
  { cat:'med', name:'CefTRIAXone 2g — IV every 24hr' },
  { cat:'med', name:'Celecoxib 100mg — G tube, bedtime' },
  { cat:'med', name:'Citalopram 40mg — G tube, once daily' },
  { cat:'med', name:'ClonazePAM 0.25mg — G tube, bedtime' },
  { cat:'med', name:'Enoxaparin 40mg — subcutaneous every 24hr' },
  { cat:'med', name:'Famotidine 40mg — PEG tube, once daily' },
  { cat:'med', name:'Gabapentin 600mg — G tube, twice daily' },
  { cat:'med', name:'Gabapentin 900mg — G tube, nightly 9pm' },
  { cat:'med', name:'GuaiFENesin 400mg — G tube, 4x daily' },
  { cat:'med', name:'Melatonin 6mg — feeding tube, bedtime' },
  { cat:'med', name:'Midodrine 5mg — G tube, with lunch' },
  { cat:'med', name:'Multivitamin 15mL — by mouth, noon' },
  { cat:'med', name:'OxyCODONE 5mg — feeding tube, bedtime' },
  { cat:'med', name:'QUEtiapine 25mg — G tube, bedtime' },
  { cat:'med', name:'TraZODone 150mg — G tube, bedtime' },
  { cat:'med', name:'Wheat Dextrin 8g — G tube, once daily' },
  // MEDICATIONS — As Needed
  { cat:'med', name:'Acetaminophen 650mg — PRN pain (1st)' },
  { cat:'med', name:'Baclofen 5mg — PRN spasms' },
  { cat:'med', name:'Balsam Peru/Castor Oil — PRN dry skin' },
  { cat:'med', name:'Bisacodyl 10mg — PRN constipation' },
  { cat:'med', name:'Carboxymethylcellulose 0.5% — PRN dry eyes' },
  { cat:'med', name:'Celecoxib 100mg — PRN pain (1st)' },
  { cat:'med', name:'ClonazePAM 0.25mg — PRN anxiety' },
  { cat:'med', name:'Gabapentin 300mg — PRN 3x daily' },
  { cat:'med', name:'HydrOXYzine 25mg — PRN anxiety/itching' },
  { cat:'med', name:'Lidocaine patch — PRN adjunctive pain' },
  { cat:'med', name:'Lidocaine topical — PRN' },
  { cat:'med', name:'Lidocaine jelly 2% — PRN urethral pain' },
  { cat:'med', name:'Menthol/Methyl Salicylate — PRN pain' },
  { cat:'med', name:'Menthol/Zinc Oxide — PRN topical' },
  { cat:'med', name:'Midodrine 5mg — PRN low BP' },
  { cat:'med', name:'Ondansetron 4mg — PRN nausea' },
  { cat:'med', name:'Ophthalmic Lubricating Ointment — PRN dry eyes' },
  { cat:'med', name:'OxyCODONE 5mg — PRN pain (3rd)' },
  { cat:'med', name:'Phenol — PRN sore throat' },
  { cat:'med', name:'Polyethylene Glycol 17g — PRN constipation' },
  { cat:'med', name:'TraZODone 50mg — PRN insomnia' },
  { cat:'med', name:'Zinc Oxide 40% — PRN irritation/rash' },
  // RESPIRATORY
  { cat:'vent', name:'Suction' },
  { cat:'vent', name:'Cough Assist' },
  { cat:'vent', name:'Trach Care' },
  { cat:'vent', name:'HME Change' },
  // NUTRITION
  { cat:'feed', name:'Bolus Feed' },
  { cat:'feed', name:'Continuous Feed' },
  { cat:'feed', name:'Water Flush' },
  { cat:'feed', name:'Residual Check' },
  { cat:'feed', name:'Self Feed' },
  // BOWEL & URINE
  { cat:'cath', name:'Straight Cath' },
  { cat:'cath', name:'Bowel Program' },
  { cat:'cath', name:'Output Check' },
  // TESTING
  { cat:'test', name:'SpO2 Check' },
  { cat:'test', name:'CO2 Check' },
  { cat:'test', name:'Blood Pressure' },
  { cat:'test', name:'Temperature' },
  { cat:'test', name:'Blood Sugar' },
];

window.runSeed = async function() {
  const btn = document.getElementById('seedBtn');
  const statusDiv = document.getElementById('status');
  const logDiv = document.getElementById('log');
  const summaryDiv = document.getElementById('summary');

  btn.disabled = true;
  btn.textContent = 'Seeding…';
  statusDiv.style.display = 'block';
  logDiv.innerHTML = '';

  // First clear any existing presets
  logDiv.innerHTML += `<div class="item">🗑 Clearing existing presets…</div>`;
  try {
    const existing = await getDocs(presetsCol);
    for (const d of existing.docs) {
      await deleteDoc(doc(db, 'presets', d.id));
    }
    logDiv.innerHTML += `<div class="item ok">✓ Cleared ${existing.size} existing presets</div>`;
  } catch(e) {
    logDiv.innerHTML += `<div class="item err">✗ Error clearing: ${e.message}</div>`;
  }

  // Now seed all presets
  let ok = 0, fail = 0;
  for (let i = 0; i < PRESETS.length; i++) {
    const p = PRESETS[i];
    try {
      await addDoc(presetsCol, { cat: p.cat, name: p.name, order: i });
      logDiv.innerHTML += `<div class="item ok">✓ [${p.cat}] ${p.name}</div>`;
      ok++;
    } catch(e) {
      logDiv.innerHTML += `<div class="item err">✗ [${p.cat}] ${p.name} — ${e.message}</div>`;
      fail++;
    }
    // Scroll to bottom as items load
    logDiv.scrollTop = logDiv.scrollHeight;
  }

  summaryDiv.innerHTML = fail === 0
    ? `✅ Done! ${ok} presets loaded successfully. You can close this page.`
    : `⚠ ${ok} succeeded, ${fail} failed. Check errors above.`;
  btn.textContent = 'Done';
};
</script>
</body>
</html>
