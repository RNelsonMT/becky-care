window.runSeed = async function() {
  const btn = document.getElementById('btn');
  const statusDiv = document.getElementById('status');
  const logDiv = document.getElementById('log');
  const summaryDiv = document.getElementById('summary');
  btn.disabled = true; btn.textContent = 'Adding…';
  statusDiv.style.display = 'block';

  let ok = 0, fail = 0;
  const parentIds = {};

  for (const c of TOP_LEVEL) {
    try {
      const ref = await addDoc(col, { ...c, parentId:'', createdAt:serverTimestamp(), updatedAt:serverTimestamp() });
      parentIds[c.name] = ref.id;
      logDiv.innerHTML += `<div class="item ok">✓ ${c.name}</div>`;
      ok++;
    } catch(e) {
      logDiv.innerHTML += `<div class="item err">✗ ${c.name} — ${e.message}</div>`;
      fail++;
    }
  }

  for (const [parentName, children] of Object.entries(CHILDREN)) {
    const parentId = parentIds[parentName];
    if (!parentId) {
      logDiv.innerHTML += `<div class="item err">✗ No parent ID for: ${parentName}</div>`;
      continue;
    }
    for (const c of children) {
      try {
        await addDoc(col, { ...c, parentId, createdAt:serverTimestamp(), updatedAt:serverTimestamp() });
        logDiv.innerHTML += `<div class="item ok">✓ ${c.name} → ${parentName}</div>`;
        ok++;
      } catch(e) {
        logDiv.innerHTML += `<div class="item err">✗ ${c.name} — ${e.message}</div>`;
        fail++;
      }
    }
  }

  summaryDiv.innerHTML = fail === 0
    ? `✅ Done! ${ok} contacts added successfully.`
    : `⚠ ${ok} succeeded, ${fail} failed.`;
  btn.textContent = 'Done';
};
