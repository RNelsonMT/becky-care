<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Fix Straight Cath</title></head>
<body>
<h2>Fixing Straight Cath Schedule...</h2>
<div id="status">Working...</div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, getDocs, doc, updateDoc, query, where } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
const app = initializeApp({
  apiKey: "AIzaSyCxPjDCBYFLc2XDqXvHcbGuqMV7265w3HE",
  authDomain: "care-tracker-383e0.firebaseapp.com",
  projectId: "care-tracker-383e0",
  storageBucket: "care-tracker-383e0.firebasestorage.app",
  messagingSenderId: "696799569086",
  appId: "1:696799569086:web:08b7e6356a018338a3aaef"
});
const db = getFirestore(app);
const schedCol = collection(db, 'schedule');
const snap = await getDocs(query(schedCol, where('name', '==', 'Straight Cath')));
if (snap.empty) {
  document.getElementById('status').textContent = 'No Straight Cath item found!';
} else {
  for (const d of snap.docs) {
    await updateDoc(doc(db, 'schedule', d.id), {
      times: ['08:30', '14:00', '19:30'],
      days: 'daily',
      onceDate: '',
      grace: 30,
    });
    document.getElementById('status').textContent = 'Done! Straight Cath scheduled at 8:30 AM, 2:00 PM, 7:30 PM daily. You can close this page.';
  }
}
</script>
</body></html>
